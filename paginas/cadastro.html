<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style_cadastro.css">
    <script src="../js/cadastro.js" defer></script>
</head>
<body>

<header>
    <h1>NextPlay Football</h1>
</header>

<nav>
    <a href="../index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="login.html">Login</a>
    <a href="carrinho.html">Carrinho</a>
</nav>

<div class="container">
    <form>
        <h2>Cadastro de Cliente</h2>

        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required>

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" required>

        <label for="cep">CEP</label>
        <input type="text" id="cep" maxlength="8" placeholder="Ex: 01001000" required>

        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" required>

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" required>

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" required>

        <label for="estado">Estado</label>
        <input type="text" id="estado" maxlength="2" placeholder="Ex: SP" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" required>

        <button type="submit" id="btnCadastro">Cadastrar</button>
    </form>
</div>

</body>
</html>
