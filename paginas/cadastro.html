<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/style_cadastro.css">
    <script src="../js/cadastro.js"></script>
</head>

<body>

    <header>
        <h1>NextPlay Football</h1>
    </header>

    <nav>
        <a href="../index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="login.html">Login</a>
        <a href="carrinho.html">Carrinho</a>
    </nav>

    <div class="container">

        <form>

            <h2>Cadastro de Cliente</h2>

            <label>Nome Completo</label>
            <input type="text" id="nome">
            
            <label>Email</label>
            <input type="email" id="email">
            
            <label>CPF</label>
            <input type="text" id="cpf">
            
            <label>Telefone</label>
            <input type="text" id="telefone">
            
            <label>Endereço</label>
            <input type="text" id="endereco">
            
            <label>Cidade</label>
            <input type="text" id="cidade">
            
            <label>Estado</label>
            <select id="estado">
                <option>AC</option>
                <option>AP</option>
                <option>AM</option>
                <option>PA</option>
                <option>RO</option>
                <option>RR</option>
                <option>TO</option>
                <option>AL</option>
                <option>BA</option>
                <option>CE</option>
                <option>MA</option>
                <option>PB</option>
                <option>PE</option>
                <option>PI</option>
                <option>RN</option>
                <option>SE</option>
                <option>GO</option>
                <option>MT</option>
                <option>MS</option>
                <option>DF</option>
                <option>SE</option>
            </select>
            
            <label>Senha</label>
            <input type="password" id="senha">

            <button id="btnCadastro" type="submit">Cadastrar</button>

        </form>

    </div>
</body>

</html>
